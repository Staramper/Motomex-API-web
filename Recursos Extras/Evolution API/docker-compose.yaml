version: '3.8'

services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.1
    container_name: evolution-api
    restart: always
    ports:
      - "1020:8080"
    environment:
      - SERVER_URL=http://192.168.0.51:1020
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR,WARN,INFO
      
      # Autenticación
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=Motomex_Secreto_2026
      
      # Conexión estricta a PostgreSQL (V2)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evo:evo_pass@evolution-postgres:5432/evolution?schema=public
      
      # Manejo de Caché con Redis (V2)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution

      - CONFIG_SESSION_PHONE_VERSION=2.3000.1040561468
      
    depends_on:
      - evolution-postgres
      - evolution-redis

  evolution-postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      - POSTGRES_USER=evo
      - POSTGRES_PASSWORD=evo_pass
      - POSTGRES_DB=evolution
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - ./redis_data:/data